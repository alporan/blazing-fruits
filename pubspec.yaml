name: blazing_fruits
description: Blazing Fruits
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  shared_preferences: ^2.2.0
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flame_test: ^1.18.0
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/fruits/
    - assets/images/laser/
    - assets/images/ui/
    - assets/icon/

  # Font declaration commented out until GameFont.ttf is added to assets/fonts/
  # fonts:
  #   - family: GameFont
  #     fonts:
  #       - asset: assets/fonts/GameFont.ttf
